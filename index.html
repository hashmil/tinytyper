<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tiny Typer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka:wght@400;600;700&family=Gaegu:wght@400;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="theme-decor" class="theme-decor"></div>
      <div id="page"></div>

      <div id="toolbar" hidden>
        <button id="font-btn" class="tool-btn font-btn" type="button" aria-label="Change font">Aa</button>
        <div class="color-dots" id="color-dots">
          <button class="dot" data-color="#2C3E50" style="background:#2C3E50" type="button" aria-label="Midnight"></button>
          <button class="dot" data-color="#D94F7A" style="background:#D94F7A" type="button" aria-label="Berry"></button>
          <button class="dot" data-color="#2B7CB5" style="background:#2B7CB5" type="button" aria-label="Ocean"></button>
          <button class="dot" data-color="#E8A317" style="background:#E8A317" type="button" aria-label="Sunshine"></button>
          <button class="dot" data-color="#2D8F5E" style="background:#2D8F5E" type="button" aria-label="Forest"></button>
          <button class="dot" data-color="#7B4FBF" style="background:#7B4FBF" type="button" aria-label="Grape"></button>
          <button class="dot" data-color="#E06230" style="background:#E06230" type="button" aria-label="Tangerine"></button>
          <button class="dot" data-color="#5C4033" style="background:#5C4033" type="button" aria-label="Cocoa"></button>
        </div>
        <button id="theme-btn" class="tool-btn theme-btn" type="button" aria-label="Change theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button id="clear-btn" class="tool-btn clear-btn" type="button" aria-label="Clear all text">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
          </svg>
        </button>
      </div>

      <button id="fullscreen-toggle" class="fullscreen-toggle" type="button" hidden>
        Go Full Screen
      </button>

      <section id="start-overlay" class="start-overlay">
        <div class="start-card">
          <p class="eyebrow">Tiny Typer</p>
          <h1>Big letters,<br>bright colours,<br>happy writing.</h1>
          <p class="intro">
            Type anything and watch colourful<br>letters bounce onto&nbsp;the&nbsp;page.
          </p>
          <div class="actions">
            <button id="start-fullscreen" class="action action-primary" type="button">
              Start Full Screen
            </button>
            <button id="start-windowed" class="action action-secondary" type="button">
              Start Here
            </button>
          </div>
          <a href="https://github.com/hashmil/tinytyper" target="_blank" rel="noopener" class="github-link" aria-label="View source on GitHub">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          </a>
        </div>
      </section>

      <input id="mobile-input" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" aria-hidden="true" />
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
